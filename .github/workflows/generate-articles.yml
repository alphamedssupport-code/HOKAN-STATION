name: 毎日記事自動生成

on:
  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      count:
        description: '生成する記事数'
        required: false
        default: '10'
      date:
        description: '公開日（YYYY-MM-DD、空欄=今日）'
        required: false
        default: ''

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set publish date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(TZ=Asia/Tokyo date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COUNT=${{ github.event.inputs.count || '10' }}
          DATE=${{ steps.date.outputs.date }}
          echo "📝 ${DATE} の記事を ${COUNT} 本生成します"
          node scripts/generate-articles.js --count=$COUNT --date=$DATE

      - name: Check for new articles
        id: check
        run: |
          git status --short
          NEW_FILES=$(git status --short | grep -c "^??" || true)
          echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          echo "新規ファイル数: $NEW_FILES"

      - name: Commit and push articles
        if: steps.check.outputs.new_files != '0'
        run: |
          git config user.name "HOKAN STATION Bot"
          git config user.email "bot@hokan-station.vercel.app"
          git add src/content/blog/
          git commit -m "📝 [${{ steps.date.outputs.date }}] 訪問看護記事 ${{ github.event.inputs.count || '10' }}本を自動生成"
          git push origin main

      - name: Summary
        if: always()
        run: |
          echo "## 🏥 HOKAN STATION 記事生成結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **日付**: ${{ steps.date.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **生成数**: ${{ github.event.inputs.count || '10' }} 本" >> $GITHUB_STEP_SUMMARY
          echo "- **新規ファイル**: ${{ steps.check.outputs.new_files }} 件" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.new_files }}" != "0" ]; then
            echo "- **ステータス**: ✅ 記事を追加しました" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **ステータス**: ⚠️ 新規ファイルがありませんでした" >> $GITHUB_STEP_SUMMARY
          fi
